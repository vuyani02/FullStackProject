name: Frontend — Lint & Build

on:
  push:
    branches: [master]
    paths:
      - '9.4.2/nextjs/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [master]
    paths:
      - '9.4.2/nextjs/**'
      - '.github/workflows/frontend.yml'

jobs:
  lint-and-build:
    name: Lint & Build (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 9.4.2/nextjs/package-lock.json

      - name: Install dependencies
        working-directory: 9.4.2/nextjs
        run: npm ci

      - name: Lint
        working-directory: 9.4.2/nextjs
        run: npm run lint

      - name: Build
        working-directory: 9.4.2/nextjs
        run: npm run build
